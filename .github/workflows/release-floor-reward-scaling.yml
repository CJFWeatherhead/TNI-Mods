name: Release floor-reward-scaling

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'lua/floor-reward-scaling/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    uses: ./.github/workflows/mod-release-reusable.yml
    with:
      mod_name: 'floor-reward-scaling'
      bump_type: ${{ inputs.bump_type || 'patch' }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
