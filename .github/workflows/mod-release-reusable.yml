name: Reusable Mod Release Workflow

on:
  workflow_call:
    inputs:
      mod_name:
        required: true
        type: string
        description: 'The mod folder name (e.g., 2x-bandwidth-switches)'
      bump_type:
        required: false
        type: string
        default: 'patch'
        description: 'Version bump type: major, minor, or patch'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install pyyaml
      
      - name: Update mod version and date
        id: version
        run: |
          python .github/scripts/update_mod_version.py "lua/${{ inputs.mod_name }}/metadata.yaml" "${{ inputs.bump_type }}"
          NEW_VERSION=$(grep '^Version:' "lua/${{ inputs.mod_name }}/metadata.yaml" | awk '{print $2}')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Updated to version $NEW_VERSION"
      
      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "lua/${{ inputs.mod_name }}/metadata.yaml"
          git commit -m "chore(${{ inputs.mod_name }}): bump version to ${{ steps.version.outputs.new_version }}"
          git push
      
      - name: Package mod
        run: |
          cd lua/${{ inputs.mod_name }}
          zip -r ../../${{ inputs.mod_name }}-${{ steps.version.outputs.new_version }}.zip . -x ".*" -x "__pycache__/*"
          cd ../..
          echo "Created ${{ inputs.mod_name }}-${{ steps.version.outputs.new_version }}.zip"
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ inputs.mod_name }}-v${{ steps.version.outputs.new_version }}"
          RELEASE_NAME="${{ inputs.mod_name }} v${{ steps.version.outputs.new_version }}"
          
          # Read mod metadata for release notes
          MOD_NAME=$(grep '^Name:' "lua/${{ inputs.mod_name }}/metadata.yaml" | sed 's/^Name: *//')
          DESCRIPTION=$(awk '/^Description:/{flag=1;next}/^[A-Z]/{flag=0}flag' "lua/${{ inputs.mod_name }}/metadata.yaml" | sed 's/^  //')
          
          # Create release notes
          cat > release_notes.md << EOF
          # ${MOD_NAME} - Version ${{ steps.version.outputs.new_version }}
          
          ${DESCRIPTION}
          
          ## Installation
          
          1. Download the zip file below
          2. Extract to your game's mods directory:
             - Windows: \`%APPDATA%\\Godot\\app_userdata\\Tower Networking Inc\\mods\\\`
             - Linux: \`~/.local/share/godot/app_userdata/Tower Networking Inc/mods/\`
          3. Ensure you have [luajit.elf](https://github.com/CJFWeatherhead/TNI-Mods/releases) installed
          4. Configure using [ModManagerGUI.ps1](https://github.com/CJFWeatherhead/TNI-Mods)
          
          ## Files Included
          
          - \`entry.lua\` - Main mod file
          - \`metadata.yaml\` - Mod metadata
          - \`README.md\` - Documentation
          
          ---
          
          For more information, visit the [mod page](https://tower.networking.ink/mods/${{ inputs.mod_name }}/)
          EOF
          
          # Create or update release
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            echo "Updating existing release $RELEASE_TAG"
            gh release delete "$RELEASE_TAG" --yes
          fi
          
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release_notes.md \
            "${{ inputs.mod_name }}-${{ steps.version.outputs.new_version }}.zip"
          
          echo "Created release: $RELEASE_TAG"
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.4'
          extended: true
      
      - name: Regenerate mod documentation pages
        run: |
          cd docs
          python3 generate_mod_pages.py
          echo "Regenerated mod pages"
      
      - name: Build Hugo site
        run: |
          cd docs
          hugo --minify
      
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tower-networking-ink
          directory: docs/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
      
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Mod**: ${{ inputs.mod_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Tag**: ${{ inputs.mod_name }}-v${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Documentation**: https://tower.networking.ink/mods/${{ inputs.mod_name }}/" >> $GITHUB_STEP_SUMMARY
