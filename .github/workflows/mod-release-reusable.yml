name: Reusable Mod Release Workflow

on:
  workflow_call:
    inputs:
      mod_name:
        required: true
        type: string
        description: 'The mod folder name (e.g., 2x-bandwidth-switches)'
      bump_type:
        required: false
        type: string
        default: 'patch'
        description: 'Version bump type: major, minor, or patch'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize all mod releases to prevent concurrent push conflicts
    concurrency:
      group: mod-release
      cancel-in-progress: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install pyyaml
      
      - name: Update mod version and date
        id: version
        run: |
          python .github/scripts/update_mod_version.py "mods/${{ inputs.mod_name }}/metadata.yaml" "${{ inputs.bump_type }}"
          NEW_VERSION=$(grep '^Version:' "mods/${{ inputs.mod_name }}/metadata.yaml" | awk '{print $2}')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Updated to version $NEW_VERSION"
      
      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "mods/${{ inputs.mod_name }}/metadata.yaml" "mods/${{ inputs.mod_name }}/mod.jsonc"
          git commit -m "chore(${{ inputs.mod_name }}): bump version to ${{ steps.version.outputs.new_version }}"
          
          # Retry push with rebase on conflict (handles concurrent workflow runs)
          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push; then
              echo "Push successful"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed, attempt $RETRY_COUNT of $MAX_RETRIES. Pulling with rebase..."
                git pull --rebase origin ${{ github.ref_name }}
                sleep $((RETRY_COUNT * 2))  # Exponential backoff
              else
                echo "Push failed after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
      
      - name: Package mod
        run: |
          # Package with mod folder at zip root so users extract <mod-name>/ into mods/
          cd mods
          zip -r ../${{ inputs.mod_name }}-${{ steps.version.outputs.new_version }}.zip \
            ${{ inputs.mod_name }}/ \
            -x "${{ inputs.mod_name }}/.*" -x "${{ inputs.mod_name }}/__pycache__/*" \
            -x "${{ inputs.mod_name }}/ui-config.ps1"
          cd ..
          echo "Created ${{ inputs.mod_name }}-${{ steps.version.outputs.new_version }}.zip"
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ inputs.mod_name }}-v${{ steps.version.outputs.new_version }}"
          RELEASE_NAME="${{ inputs.mod_name }} v${{ steps.version.outputs.new_version }}"
          
          # Read mod metadata for release notes
          MOD_NAME=$(grep '^Name:' "mods/${{ inputs.mod_name }}/metadata.yaml" | sed 's/^Name: *//')
          DESCRIPTION=$(awk '/^Description:/{flag=1;next}/^[A-Z]/{flag=0}flag' "mods/${{ inputs.mod_name }}/metadata.yaml" | sed 's/^  //')
          
          # Create release notes
          cat > release_notes.md << EOF
          # ${MOD_NAME} - Version ${{ steps.version.outputs.new_version }}
          
          ${DESCRIPTION}
          
          ## Installation
          
          1. Download the zip file below
          2. Extract the \`${{ inputs.mod_name }}/\` folder into your game's mods directory:
             - Windows: \`%APPDATA%\\Godot\\app_userdata\\Tower Networking Inc\\Mods\\\`
             - Linux: \`~/.local/share/godot/app_userdata/Tower Networking Inc/Mods/\`
          3. Ensure you have [luajit-support](https://github.com/CJFWeatherhead/TNI-Mods/releases) installed
          4. Configure using [ModManagerGUI.ps1](https://github.com/CJFWeatherhead/TNI-Mods)
          
          ## Files Included
          
          - \`entry.lua\` - Main mod file
          - \`mod.jsonc\` - Mod metadata (required by game)
          - \`metadata.yaml\` - Extended metadata
          - \`README.md\` - Documentation
          
          ---
          
          For more information, visit the [mod page](https://tower.networking.ink/mods/${{ inputs.mod_name }}/)
          EOF
          
          # Create or update release
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            echo "Updating existing release $RELEASE_TAG"
            gh release delete "$RELEASE_TAG" --yes
          fi
          
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release_notes.md \
            "${{ inputs.mod_name }}-${{ steps.version.outputs.new_version }}.zip"
          
          echo "Created release: $RELEASE_TAG"
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.4'
          extended: true
      
      - name: Regenerate mod documentation pages
        run: |
          cd docs
          python3 generate_mod_pages.py
          echo "Regenerated mod pages"
      
      - name: Build Hugo site
        run: |
          cd docs
          hugo --minify
      
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Mod**: ${{ inputs.mod_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Tag**: ${{ inputs.mod_name }}-v${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Documentation**: https://tower.networking.ink/mods/${{ inputs.mod_name }}/" >> $GITHUB_STEP_SUMMARY
