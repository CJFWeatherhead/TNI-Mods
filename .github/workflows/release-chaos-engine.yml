name: Release chaos-engine

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'lua/chaos-engine/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    uses: ./.github/workflows/mod-release-reusable.yml
    with:
      mod_name: 'chaos-engine'
      bump_type: ${{ inputs.bump_type || 'patch' }}
