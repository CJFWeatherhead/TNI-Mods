name: Build with Zig on Windows and update continuous release

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "mods/**/metadata.yaml"
      - "mods/**/README.md"
  # NOTE: This is privileged, do not run pull_requests.

concurrency:
  group: build-zig-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
    - uses: actions/checkout@v6.0.2
      with:
        submodules: recursive

    - name: Install dependencies
      shell: bash
      run: |
        choco install ninja zip -y
        # Install Zig
        curl -L https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip -o zig.zip
        7z.exe x -y zig.zip

    - name: Build luajit support mod and C++ examples
      working-directory: ${{github.workspace}}
      shell: bash
      run: |
        export PATH=$PWD/zig-x86_64-windows-0.15.2:$PATH
        ./build-zig.cmd

    - name: Collect Artifact
      shell: bash
      run: |
        mkdir ./artifact
        # For every directory containing a .elf file, zip it into ./artifact
        find ./mods/ -name '*.elf' -execdir bash -c "MOD_NAME=\"\$(basename \$(realpath .))\" && cd .. && zip -r \"${PWD}/artifact/\$MOD_NAME.zip\" \"./\$MOD_NAME\"" \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: artifact
        path: ./artifact

    - name: Create/Update continuous release
      shell: bash
      run: |
        RELEASE_TAG="continuous-zig-${{github.ref_name}}"
        RELEASE_NAME="Continuous (zig) - ${{github.ref_name}}"
        RELEASE_NOTES_PATH=".github/workflows/continuous-zig-release-notes.md"
        gh release delete --cleanup-tag --yes "$RELEASE_TAG"
        gh release create --target "${{github.sha}}" --title "$RELEASE_NAME" --notes-file "$RELEASE_NOTES_PATH" --draft --prerelease "$RELEASE_TAG"
        find ./artifact -name '*.zip' -exec gh release upload --clobber "$RELEASE_TAG" "{}" \;
        gh release edit "$RELEASE_TAG" --draft=false
