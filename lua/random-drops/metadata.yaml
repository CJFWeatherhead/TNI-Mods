  This mod uses on_device_spawned, on_user_spawned, on_location_spawned, and on_tick callbacks.
  Some features depend on game API availability and may have limited functionality in certain game versions.

Parameters:
  # Feature 1: Random Item Spawning
  - Name: enable_random_spawns
    Label: Enable Random Item Spawning
    Type: boolean
    Default: true
    Description: Periodically spawn random devices at configurable intervals

  - Name: spawn_interval_seconds
    Label: Spawn Interval (Seconds)
    Type: integer
    Default: 60
    Min: 10
    Max: 600
    Step: 10
    Description: Time in seconds between random spawn events

  - Name: spawn_count_min
    Label: Minimum Items Per Spawn
    Type: integer
    Default: 1
    Min: 1
    Max: 10
    Description: Minimum number of items to spawn each interval

  - Name: spawn_count_max
    Label: Maximum Items Per Spawn
    Type: integer
    Default: 3
    Min: 1
    Max: 20
    Description: Maximum number of items to spawn each interval

  - Name: spawn_all_items
    Label: Spawn All Item Types
    Type: boolean
    Default: true
    Description: If enabled, all device types can spawn. If disabled, use the filters below.

  - Name: spawn_switches
    Label: Include Network Switches
    Type: boolean
    Default: true
    Description: Allow network switches to spawn (when not using all items)

  - Name: spawn_routers
    Label: Include Routers
    Type: boolean
    Default: true
    Description: Allow routers to spawn (when not using all items)

  - Name: spawn_firewalls
    Label: Include Firewalls
    Type: boolean
    Default: true
    Description: Allow firewalls to spawn (when not using all items)

  - Name: spawn_servers
    Label: Include Servers
    Type: boolean
    Default: true
    Description: Allow compute servers to spawn (when not using all items)

  - Name: spawn_workstations
    Label: Include Workstations
    Type: boolean
    Default: false
    Description: Allow workstations/monitors to spawn (when not using all items)

  - Name: spawn_misc
    Label: Include Miscellaneous Devices
    Type: boolean
    Default: false
    Description: Allow other device types to spawn (UPS, surge protectors, etc.)

  # Feature 2: Extra Users on Floor Creation
  - Name: enable_extra_users
    Label: Enable Extra Users on Floor Creation
    Type: boolean
    Default: true
    Description: Automatically add extra random users when a new floor is created

  - Name: extra_users_min
    Label: Minimum Extra Users
    Type: integer
    Default: 1
    Min: 1
    Max: 10
    Description: Minimum number of extra users to add per floor

  - Name: extra_users_max
    Label: Maximum Extra Users
    Type: integer
    Default: 3
    Min: 1
    Max: 20
    Description: Maximum number of extra users to add per floor

  # Feature 3: Purchase Multiplier
  - Name: enable_purchase_multiplier
    Label: Enable Purchase Multiplier
    Type: boolean
    Default: true
    Description: Receive multiple copies when purchasing items from the shop

  - Name: purchase_multiplier
    Label: Purchase Multiplier
    Type: integer
    Default: 2
    Min: 1
    Max: 10
    Description: Number of items received per purchase (1 = normal, 2 = double, etc.)

  # General Settings
  - Name: debug_logging
    Label: Enable Debug Logging
    Type: boolean
    Default: true
    Description: Show detailed log messages in the console
