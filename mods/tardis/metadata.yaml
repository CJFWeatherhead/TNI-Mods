Notes: |
  Uses GameWorld.update_server_timescale() for speed control and DayCycleController.force_day_clock() for time skipping.
  Speed changes persist until manually changed or game restart.
Parameters:
  - Name: speed_step
    Label: Speed Change Step
    Type: number
    Default: 0.5
    Min: 0.1
    Max: 2.0
    Step: 0.1
    Description: Amount to change the speed multiplier when pressing SHIFT+> or SHIFT+<
  - Name: min_speed
    Label: Minimum Speed
    Type: number
    Default: 0.125
    Min: 0.125
    Max: 1.0
    Step: 0.125
    Description: Minimum allowed game speed multiplier (game hard limit is 0.125x)
  - Name: max_speed
    Label: Maximum Speed
    Type: number
    Default: 8.0
    Min: 2.0
    Max: 8.0
    Step: 0.5
    Description: Maximum allowed game speed multiplier (game hard limit is 8x)
  - Name: default_speed
    Label: Default Speed
    Type: number
    Default: 1.0
    Min: 0.25
    Max: 5.0
    Step: 0.25
    Description: Default game speed to use (for reference)
  - Name: skip_to_time
    Label: Skip To Time (hours)
    Type: number
    Default: 23.99
    Min: 0.0
    Max: 23.99
    Step: 0.5
    Description: Time of day to skip to when pressing SHIFT++ (24-hour format, e.g., 23.99 = 23:59)
  - Name: show_notifications
    Label: Show In-Game Notifications
    Type: boolean
    Default: true
    Description: Display on-screen notifications when speed changes or time skips
  - Name: debug_logging
    Label: Enable Debug Logging
    Type: boolean
    Default: false
    Description: Show detailed debug messages in the console
