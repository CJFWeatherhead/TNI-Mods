  # Bandwidth Settings
  - Name: enable_bandwidth
    Label: Enable Bandwidth Modification
    Type: boolean
    Default: false
    Description: Enable bandwidth capacity modifications
    
  - Name: bandwidth_multiplier
    Label: Bandwidth Multiplier
    Type: number
    Default: 2.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Multiplier for device network bandwidth (e.g., 2.0 = double bandwidth)
  
  # Warranty Settings
  - Name: enable_warranty
    Label: Enable Warranty Modification
    Type: boolean
    Default: false
    Description: Enable warranty period modifications
    
  - Name: warranty_mode
    Label: Warranty Mode
    Type: select
    Default: fixed
    Options: ["fixed", "random"]
    Description: Use a fixed multiplier or random range for warranties
    
  - Name: warranty_multiplier_fixed
    Label: Fixed Warranty Multiplier
    Type: number
    Default: 1.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Fixed multiplier for warranties (used when mode is 'fixed')
    
  - Name: warranty_multiplier_min
    Label: Min Random Warranty Multiplier
    Type: number
    Default: 2.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Minimum multiplier for random warranties (used when mode is 'random')
    
  - Name: warranty_multiplier_max
    Label: Max Random Warranty Multiplier
    Type: number
    Default: 25.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Maximum multiplier for random warranties (used when mode is 'random')
    
  - Name: warranty_apply_cycles
    Label: Apply to Warranty Cycles
    Type: boolean
    Default: true
    Description: Whether to also multiply warranty cycles (in addition to days)
    
  - Name: warranty_apply_remaining
    Label: Apply to Remaining Warranty
    Type: boolean
    Default: true
    Description: Whether to also apply multiplier to remaining warranty period
  
  # Cost Settings
  - Name: enable_cost
    Label: Enable Cost Modification
    Type: boolean
    Default: false
    Description: Enable device cost modifications
    
  - Name: cost_multiplier
    Label: Cost Multiplier
    Type: number
    Default: 1.0
    Min: 0.01
    Max: 100.0
    Step: 0.01
    Description: Multiplier for device purchase costs (e.g., 0.5 = half price, 2.0 = double price)
  
  # CPU Settings
  - Name: enable_cpu
    Label: Enable CPU Modification
    Type: boolean
    Default: false
    Description: Enable CPU power modifications
    
  - Name: cpu_multiplier
    Label: CPU Power Multiplier
    Type: number
    Default: 1.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Multiplier for device CPU power
  
  # Memory Settings
  - Name: enable_memory
    Label: Enable Memory Modification
    Type: boolean
    Default: false
    Description: Enable RAM modifications
    
  - Name: memory_multiplier
    Label: Memory (RAM) Multiplier
    Type: number
    Default: 1.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Multiplier for device installed RAM
  
  # Storage Settings
  - Name: enable_storage
    Label: Enable Storage Modification
    Type: boolean
    Default: false
    Description: Enable storage capacity modifications
    
  - Name: storage_multiplier
    Label: Storage Multiplier
    Type: number
    Default: 1.0
    Min: 0.1
    Max: 100.0
    Step: 0.1
    Description: Multiplier for device storage capacity
  
  # Network Address Settings
  - Name: enable_netaddr
    Label: Enable Auto Network Addressing
    Type: boolean
    Default: false
    Description: |
      Automatically assign network addresses based on floor and device class.
      Format: @f{floor}/{class}{increment}
      Examples: @f4/srv1 (compute server on floor 4), @f2/swt1 (switch on floor 2), @f18/nlb2 (load balancer on floor 18)
      
      Device class abbreviations (3 letters):
      def=default, swt=switch, rtr=router, tap=tap, fwr=firewall, mls=media_simplex, mld=media_duplex,
      srv=server, mon=monitor, dbg=debugger, ldt=load_tester, pwr=power_expansion, dcr=decentro_rigs,
      spr=surge_protector, ups=ups, ine=inert, ccv=cctv, phn=phone, prt=printer, nlb=load_balancer
  
  # DHCP Settings
  - Name: dhcp_mode
    Label: DHCP Mode
    Type: select
    Default: disabled
    Options: ["disabled", "boot_dhcp", "periodic_dhcp"]
    Description: Set the DHCP mode for devices - disabled, boot_dhcp (runs once at boot), or periodic_dhcp (runs periodically)

  # Merchant Restock Settings
  - Name: enable_restock_hotkey
    Label: Enable Merchant Restock Hotkey
    Type: boolean
    Default: true
    Description: |
      Enable CTRL+SHIFT+R hotkey to instantly restock all merchants.
      Useful when you need more devices but stock is depleted.

  - Name: show_restock_notification
    Label: Show Restock Notification
    Type: boolean
    Default: true
    Description: Display an in-game notification when merchants are restocked
