Notes: Uses on_key_pressed hook to detect SHIFT+M keyboard combination. Includes 0.5s cooldown to prevent accidental double-activation.
Parameters:
  - Name: money_amount
    Label: Money Amount
    Type: integer
    Default: 10000
    Min: 100
    Max: 10000000
    Step: 100
    Description: Amount of money to add when SHIFT+M is pressed
  - Name: debug_logging
    Label: Enable Debug Logging
    Type: boolean
    Default: true
    Description: Log detailed information to console when cheat is activated
  - Name: show_notification
    Label: Show In-Game Notification
    Type: boolean
    Default: true
    Description: Attempt to show an in-game notification when money is added (may not be supported by all game versions)
