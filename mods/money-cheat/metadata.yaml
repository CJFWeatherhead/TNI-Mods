Notes: Uses on_player_input hook to detect SHIFT+M (money) and SHIFT+R (restock) keyboard combinations. Restock functionality was moved here from device-tweaker in v5.0.0.
Parameters:
  - Name: money_amount
    Label: Money Amount
    Type: integer
    Default: 10000
    Min: 100
    Max: 10000000
    Step: 100
    Description: Amount of money to add when SHIFT+M is pressed
  - Name: debug_logging
    Label: Enable Debug Logging
    Type: boolean
    Default: false
    Description: Log detailed information to console when shortcuts are activated
